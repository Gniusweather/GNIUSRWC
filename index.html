<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Camera & Windy Dashboard</title>

<style>
  :root{
    --bg:#05050a;
    --panel-bg: rgba(22,22,24,0.62);
    --panel-border: rgba(255,255,255,0.06);
    --accent: #2dd4bf;
    --muted: rgba(255,255,255,0.68);
    --radius: 14px;
  }

  html,body{
    height:100%;
    margin:0;
    background:linear-gradient(180deg,#02020a 0%,var(--bg) 100%);
    font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
    color:#fff;
    -webkit-font-smoothing:antialiased;
  }

  .app {
    height:100vh;
    display:flex;
    flex-direction:column;
    gap:12px;
    padding:12px;
    box-sizing:border-box;
  }

  /* Panels */
  .panel {
    border-radius:var(--radius);
    background:var(--panel-bg);
    border:1px solid var(--panel-border);
    box-shadow:0 10px 30px rgba(0,0,0,0.55);
    overflow:hidden;
    backdrop-filter: blur(10px);
  }

  .panel-head {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 14px;
    background: linear-gradient(180deg, rgba(0,0,0,0.22), rgba(0,0,0,0.12));
    border-bottom:1px solid rgba(255,255,255,0.03);
  }

  .h-title { font-weight:700; font-size:15px; }
  .h-sub { font-size:12px; color:var(--muted); }

  /* iframe styles */
  iframe.map {
    width:100%;
    height:100%;
    border:0;
    display:block;
    background:#000;
    overflow:hidden;
    pointer-events:none; /* locked: no pan/zoom/scroll */
  }

  iframe.camera {
    width:100%;
    height:100%;
    border:0;
    display:block;
    background:#000;
    overflow:hidden;
    pointer-events:auto; /* camera controls enabled */
  }

  /* Layout sizes (Safari friendly fixed heights) */
  /* Camera gets more space */
  #cameraPanel { height:72vh; }
  #mapsRow { height:26vh; display:flex; gap:12px; box-sizing:border-box; padding:10px; }
  .mapBox { flex:1; border-radius:10px; overflow:hidden; display:flex; flex-direction:column; }

  /* responsive */
  @media (max-width:900px){
    #cameraPanel { height:68vh; }
    #mapsRow { height:30vh; flex-direction:row; }
  }
  @media (max-width:700px){
    #cameraPanel { height:62vh; }
    #mapsRow { height:36vh; flex-direction:column; padding:6px; gap:8px; }
    .mapBox { height:33vh; }
  }
</style>
</head>
<body>
  <div class="app">

    <!-- Camera panel (interaction enabled) -->
    <div id="cameraPanel" class="panel">
      <div class="panel-head" aria-hidden="true">
        <div class="h-title">Camera</div>
        <div class="h-sub"></div>
      </div>

      <!-- camera iframe allows interaction -->
      <iframe id="camFrame" class="camera" src="http://192.168.1.69/control/userimage.html"></iframe>
    </div>

    <!-- Maps row: Windy Satellite | Windy Radar (side-by-side, equal size) -->
    <div id="mapsRow" class="panel" style="display:flex;align-items:stretch;">
      <!-- Windy Satellite (focused on ABC islands) -->
      <div class="mapBox">
        <div class="panel-head" style="padding:8px 12px;">
          <div class="h-title">Windy Satellite</div>
          <div class="h-sub">ABC islands</div>
        </div>
        <iframe id="windySat" class="map"
          src="https://embed.windy.com/embed2.html?lat=12.167&lon=-68.998&zoom=9&overlay=satellite">
        </iframe>
      </div>

      <!-- Windy Radar (focused on ABC islands) -->
      <div class="mapBox">
        <div class="panel-head" style="padding:8px 12px;">
          <div class="h-title">Windy Radar</div>
          <div class="h-sub">ABC islands</div>
        </div>
        <iframe id="windyRadar" class="map"
          src="https://embed.windy.com/embed2.html?lat=12.167&lon=-68.998&zoom=9&overlay=radar">
        </iframe>
      </div>
    </div>

  </div>

<script>
  // Auto-refresh Windy panels every 60 seconds (keeps them current)
  function refreshMaps(){
    const t = Date.now();
    const sat = document.getElementById('windySat');
    const rad = document.getElementById('windyRadar');

    if(sat) sat.src = 'https://embed.windy.com/embed2.html?lat=12.167&lon=-68.998&zoom=9&overlay=satellite' + '&_=' + t;
    if(rad) rad.src = 'https://embed.windy.com/embed2.html?lat=12.167&lon=-68.998&zoom=9&overlay=radar' + '&_=' + t;
  }

  setInterval(refreshMaps, 60000);
</script>
</body>
</html>
