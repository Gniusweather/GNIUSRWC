<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Camera + Windy Dashboard</title>

<style>
    body {
        margin: 0;
        background: #0d0d0d;
        font-family: Arial, sans-serif;
        color: #fff;
        overflow: hidden;
    }

    .container {
        display: grid;
        grid-template-columns: 1.6fr 1fr;
        height: 100vh;
        gap: 8px;
        padding: 8px;
        box-sizing: border-box;
    }

    .panel {
        background: #1a1a1a;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 0 12px rgba(0,0,0,0.6);
        display: flex;
        flex-direction: column;
    }

    .title {
        padding: 6px 10px;
        background: #111;
        font-size: 15px;
        font-weight: bold;
        border-bottom: 1px solid #333;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
        flex-grow: 1;
        background: #000;
    }

    .right-side {
        display: grid;
        grid-template-rows: 1fr 1fr;
        gap: 8px;
    }
</style>
</head>

<body>A

<div class="container">

    <!-- LARGE CAMERA PANEL -->
    <div class="panel">
        <div class="title">Live Camera – 192.168.1.69</div>
        <iframe src="http://192.168.1.69/control/userimage.html"></iframe>
    </div>

    <!-- RIGHT SIDE: WINDY STACKED -->
    <div class="right-side">

        <div class="panel">
            <div class="title">Windy Satellite View (Your URL)</div>
            <iframe id="windySat" src="https://embed.windy.com/embed2.html?lat=12.167&lon=-68.998&zoom=9&overlay=satellite"></iframe>
        </div>

        <div class="panel">
            <div class="title">Windy Radar – Zoomed In</div>
            <iframe id="windyRadar" src="https://embed.windy.com/embed2.html?lat=12.20&lon=-69.05&zoom=9&overlay=radar"></iframe>
        </div>

    </div>

</div>

<!-- AUTO-REFRESH SCRIPT -->
<script>
    function refreshWindy() {
        document.getElementById("windySat").src += "";
        document.getElementById("windyRadar").src += "";
    }

    // Refresh every 1 minute (60,000 ms)
    setInterval(refreshWindy, 60000);
</script>

</body>
</html>
