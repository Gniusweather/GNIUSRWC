name: Weather alerts push

on:
  # Runs every 30 minutes to match the in-app alert copy ("checks every
  # 30 min"). Deduped via actions/cache so unchanged conditions don't
  # re-notify. If GitHub's abuse automation flags the cron again, comment
  # the schedule block back out — workflow_dispatch still works manually.
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:
    inputs:
      test:
        description: 'Send a test notification'
        type: boolean
        default: false

permissions:
  contents: read

concurrency: wx-alerts

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Restore the last-alert signature so unchanged conditions don't re-notify
      - name: Restore alert state
        uses: actions/cache/restore@v4
        with:
          path: .wx-state
          key: wx-state-restore
          restore-keys: wx-state-

      - name: Check conditions and push via ntfy
        env:
          NTFY_TOPIC: ${{ vars.NTFY_TOPIC }}
          WX_TEST: ${{ inputs.test && '1' || '' }}
        run: node scripts/wx-alerts.mjs

      - name: Save alert state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .wx-state
          key: wx-state-${{ github.run_id }}
